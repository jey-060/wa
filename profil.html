<!DOCTYPE html>
<html>
  
<head>
  <link rel="stylesheet" href="design.css">
</head>
<body>
  <h2>프로필</h2>
  <p id="user"></p>

  <button onclick="logout()">로그아웃</button>

  <script>
    fetch('http://localhost:3000/profil')
      .then(res => res.json())
      .then(data => {
        if (data.username) {
          document.getElementById('user').innerText = data.username;
        } else {
          alert('로그인 필요');
          location.href = 'insult.html';
        }
      });

    function logout() {
      fetch('http://localhost:3000/logout')
        .then(() => location.href = 'start.html');
    }
  </script>
</body>
</html>
